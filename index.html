<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jeroldy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Background video */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* ENTER SCREEN */
#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.7s ease;
}

/* MAIN CONTAINER (PERFECT CENTER) */
.wrapper {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    transition: transform 0.1s ease;
}

/* GLOW TEXT */
h1 {
    font-size: 3rem;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px white, 0 0 60px white; }
}

/* PROFILE */
img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* LINKS */
.links a {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

/* MUTE BUTTON */
#muteBtn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    cursor: pointer;
    z-index: 5;
}
</style>
</head>

<body>

<div id="enter">click to enter</div>

<video autoplay muted loop>
    <source src="ssstik.io_@bob305890_1773894028146.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div id="muteBtn">🔊</div>

<div class="wrapper">
    <div class="container" id="main">
        <img src="jeroldtwitchpfp.jpg">
        <h1 id="name"></h1>
        <p>📍 killwaukee</p>

        <div class="links">
            <a href="https://www.instagram.com/oliiverrg" target="_blank">instagram</a>
            <a href="https://www.tiktok.com/@oliver.org" target="_blank">tiktok</a>
            <a href="https://discord.com/users/675104449160806400">discord</a>
        </div>
    </div>
</div>

<audio id="music" loop>
    <source src="242326090.mp3" type="audio/mpeg">
</audio>

<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const muteBtn = document.getElementById("muteBtn");
const container = document.getElementById("main");

/* ENTER FADE + AUDIO FADE IN */
enter.addEventListener("click", () => {
    enter.style.opacity = "0";

    setTimeout(() => {
        enter.style.display = "none";
    }, 700);

    music.volume = 0;
    music.play();

    let vol = 0;
    const fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 100);
});

/* MUTE TOGGLE (FIXED) */
let muted = false;

muteBtn.addEventListener("click", () => {
    muted = !muted;
    music.muted = muted;
    muteBtn.innerText = muted ? "🔇" : "🔊";
});

/* TYPING EFFECT */
const text = "jeroldy";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}
type();

/* TILT / PARALLAX EFFECT */
document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.clientX) / 25;
    const y = (window.innerHeight / 2 - e.clientY) / 25;

    container.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
