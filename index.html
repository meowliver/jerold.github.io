<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jeroldy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background-color: black;
}

/* Background video */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* ENTER SCREEN - DARK MASK + BLUR */
#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); 
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
}

/* MAIN CONTAINER (FIXED ALIGNMENT) */
.wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center; /* Centers horizontally */
    align-items: center;     /* Centers vertically */
    perspective: 1000px;
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
}

/* GLOW TEXT */
h1 {
    font-size: 3rem;
    margin: 10px 0;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px white, 0 0 60px white; }
}

/* PROFILE */
img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* LINKS */
.links a {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

/* MUTE BUTTON */
#muteBtn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    cursor: pointer;
    z-index: 5;
    user-select: none;
}
</style>
</head>

<body>

<div id="enter">click to enter</div>

<video autoplay muted loop>
    <source src="ssstik.io_@bob305890_1773894028146.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div id="muteBtn">🔊</div>

<div class="wrapper">
    <div class="container" id="main">
        <img src="jeroldtwitchpfp.jpg">
        <h1 id="name"></h1>
        <p>📍 killwaukee</p>

        <div class="links">
            <a href="https://www.instagram.com/oliiverrg" target="_blank">instagram</a>
            <a href="https://www.tiktok.com/@oliver.org" target="_blank">tiktok</a>
            <a href="https://discord.com/users/675104449160806400">discord</a>
            <a href="https://www.twitch.tv/jeroldy">twitch</a>
            <a href="https://www.youtube.com/@jeroldyt">youtube</a>
        </div>
    </div>
</div>

<audio id="music" loop>
    <source src="242326090.mp3" type="audio/mpeg">
</audio>

<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const muteBtn = document.getElementById("muteBtn");
const container = document.getElementById("main");

let fadeInterval;
let isMuted = false;

/* --- AUDIO FADE LOGIC --- */
function fadeAudio(targetVolume) {
    clearInterval(fadeInterval);
    const step = 0.05;
    const speed = 50;

    fadeInterval = setInterval(() => {
        if (music.volume < targetVolume) {
            music.volume = Math.min(music.volume + step, targetVolume);
        } else if (music.volume > targetVolume) {
            music.volume = Math.max(music.volume - step, targetVolume);
        }

        if (music.volume === targetVolume) {
            clearInterval(fadeInterval);
        }
    }, speed);
}

/* --- TAB VISIBILITY LOGIC --- */
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        fadeAudio(0);
    } else {
        if (enter.style.display === "none" && !isMuted) {
            fadeAudio(0.3);
        }
    }
});

/* --- ENTER SCREEN LOGIC --- */
enter.addEventListener("click", () => {
    enter.style.opacity = "0";
    enter.style.backdropFilter = "blur(0px)";
    setTimeout(() => { enter.style.display = "none"; }, 800);
    
    music.volume = 0;
    music.play();
    fadeAudio(0.3);
});

/* --- MUTE TOGGLE --- */
muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    if (isMuted) {
        fadeAudio(0);
        muteBtn.innerText = "🔇";
    } else {
        fadeAudio(0.3);
        muteBtn.innerText = "🔊";
    }
});

/* --- TYPING EFFECT --- */
const text = "jeroldy";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}
type();

/* --- SMOOTH PARALLAX (LERP) --- */
let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
const friction = 0.08; 

document.addEventListener("mousemove", (e) => {
    targetX = (window.innerWidth / 2 - e.clientX) / 20;
    targetY = (window.innerHeight / 2 - e.clientY) / 20;
});

function animateParallax() {
    currentX += (targetX - currentX) * friction;
    currentY += (targetY - currentY) * friction;
    container.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
    requestAnimationFrame(animateParallax);
}
animateParallax();
</script>

</body>
</html>
