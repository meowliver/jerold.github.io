<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jeroldy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background-color: black;
}

/* Background video */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* ENTER SCREEN */
#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); 
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
}

/* MAIN CONTAINER */
.wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 90px); /* Leaves room for the player */
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
}

/* GLOW TEXT */
h1 {
    font-size: 3rem;
    margin: 10px 0;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px white, 0 0 60px white; }
}

img.pfp {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* LINKS */
.links a {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

/* SPOTIFY PLAYER BAR */
#player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 90px;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    box-sizing: border-box;
    z-index: 5;
}

.track-info {
    display: flex;
    align-items: center;
    width: 30%;
}

.album-art {
    width: 60px;
    height: 60px;
    border-radius: 5px;
    margin-right: 15px;
}

.track-text h4 {
    margin: 0;
    font-size: 1rem;
}

.track-text p {
    margin: 0;
    font-size: 0.8rem;
    color: #b3b3b3;
}

.player-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 40%;
}

.buttons {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 5px;
}

.control-btn {
    cursor: pointer;
    font-size: 1.2rem;
    opacity: 0.8;
    transition: 0.2s;
}

.control-btn:hover {
    opacity: 1;
    transform: scale(1.1);
}

.progress-container {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
}

.progress-bar {
    flex-grow: 1;
    height: 4px;
    background: #4f4f4f;
    border-radius: 2px;
    position: relative;
}

#progress {
    width: 0%;
    height: 100%;
    background: white;
    border-radius: 2px;
}

.time {
    font-size: 0.7rem;
    color: #b3b3b3;
    min-width: 30px;
}

.volume-section {
    width: 30%;
    display: flex;
    justify-content: flex-end;
}

#muteBtn {
    background: none;
    border: none;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="enter">click to enter</div>

<video autoplay muted loop>
    <source src="ssstik.io_@bob305890_1773894028146.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="wrapper">
    <div class="container" id="main">
        <img src="jeroldtwitchpfp.jpg" class="pfp">
        <h1 id="name"></h1>
        <p>📍 killwaukee</p>

        <div class="links">
            <a href="https://www.instagram.com/oliiverrg" target="_blank">instagram</a>
            <a href="https://www.tiktok.com/@oliver.org" target="_blank">tiktok</a>
            <a href="https://discord.com/users/675104449160806400">discord</a>
            <a href="https://www.twitch.tv/jeroldy">twitch</a>
            <a href="https://www.youtube.com/@jeroldyt">youtube</a>
        </div>
    </div>
</div>

<div id="player-bar">
    <div class="track-info">
        <img src="https://upload.wikimedia.org/wikipedia/en/b/b5/A_Boogie_wit_da_Hoodie_-_TBA.png" class="album-art">
        <div class="track-text">
            <h4>My Shit</h4>
            <p>A Boogie Wit Da Hoodie</p>
        </div>
    </div>

    <div class="player-controls">
        <div class="buttons">
            <div class="control-btn">⏮</div>
            <div id="playPause" class="control-btn">⏸</div>
            <div class="control-btn">⏭</div>
        </div>
        <div class="progress-container">
            <span class="time" id="current-time">0:00</span>
            <div class="progress-bar"><div id="progress"></div></div>
            <span class="time" id="duration">0:00</span>
        </div>
    </div>

    <div class="volume-section">
        <button id="muteBtn">🔊</button>
    </div>
</div>

<audio id="music" loop>
    <source src="242326090.mp3" type="audio/mpeg">
</audio>

<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const muteBtn = document.getElementById("muteBtn");
const playPause = document.getElementById("playPause");
const container = document.getElementById("main");
const progressBar = document.getElementById("progress");
const currTimeTxt = document.getElementById("current-time");
const durationTxt = document.getElementById("duration");

let fadeInterval;
let isMuted = false;
let isPaused = false;

/* --- AUDIO FADE LOGIC --- */
function fadeAudio(targetVolume) {
    clearInterval(fadeInterval);
    const step = 0.05;
    const speed = 50;

    fadeInterval = setInterval(() => {
        if (music.volume < targetVolume) {
            music.volume = Math.min(music.volume + step, targetVolume);
        } else if (music.volume > targetVolume) {
            music.volume = Math.max(music.volume - step, targetVolume);
        }
        if (music.volume === targetVolume) clearInterval(fadeInterval);
    }, speed);
}

/* --- TAB VISIBILITY --- */
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        fadeAudio(0);
    } else {
        if (enter.style.display === "none" && !isMuted && !isPaused) {
            fadeAudio(0.3);
        }
    }
});

/* --- ENTER SCREEN --- */
enter.addEventListener("click", () => {
    enter.style.opacity = "0";
    enter.style.backdropFilter = "blur(0px)";
    setTimeout(() => { enter.style.display = "none"; }, 800);
    music.volume = 0;
    music.play();
    fadeAudio(0.3);
});

/* --- MUTE TOGGLE --- */
muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    if (isMuted) {
        fadeAudio(0);
        muteBtn.innerText = "🔇";
    } else {
        fadeAudio(0.3);
        muteBtn.innerText = "🔊";
    }
});

/* --- PLAY/PAUSE TOGGLE --- */
playPause.addEventListener("click", () => {
    isPaused = !isPaused;
    if (isPaused) {
        fadeAudio(0);
        playPause.innerText = "▶";
    } else {
        fadeAudio(0.3);
        playPause.innerText = "⏸";
    }
});

/* --- PROGRESS BAR LOGIC --- */
music.addEventListener("timeupdate", () => {
    const curr = music.currentTime;
    const dur = music.duration;
    if (dur) {
        progressBar.style.width = (curr / dur) * 100 + "%";
        currTimeTxt.innerText = formatTime(curr);
        durationTxt.innerText = formatTime(dur);
    }
});

function formatTime(secs) {
    const mins = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${mins}:${s < 10 ? '0' : ''}${s}`;
}

/* --- TYPING EFFECT --- */
const text = "jeroldy";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}
type();

/* --- SMOOTH PARALLAX --- */
let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
const friction = 0.08; 

document.addEventListener("mousemove", (e) => {
    targetX = (window.innerWidth / 2 - e.clientX) / 20;
    targetY = (window.innerHeight / 2 - e.clientY) / 20;
});

function animateParallax() {
    currentX += (targetX - currentX) * friction;
    currentY += (targetY - currentY) * friction;
    container.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
    requestAnimationFrame(animateParallax);
}
animateParallax();
</script>

</body>
</html>
