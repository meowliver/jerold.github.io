<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jeroldy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background-color: black;
}

/* Background video */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* ENTER SCREEN */
#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); 
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
}

/* MAIN CONTAINER */
.wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
}

/* GLOW TEXT */
h1 {
    font-size: 3rem;
    margin: 10px 0;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px white, 0 0 60px white; }
}

img.pfp {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* LINKS */
.links a {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

/* --- Y2K 141 & Nature Aesthetic Media Player --- */
#player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 90px;
    /* Lowered from 0.92 to 0.5 for transparency */
    background: rgba(10, 25, 10, 0.5); 
    /* Lowered blur to make the background video more visible */
    backdrop-filter: blur(5px); 
    -webkit-backdrop-filter: blur(5px);
    
    border-top: 1px solid rgba(150, 200, 150, 0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
    z-index: 5;
    box-shadow: 0 -5px 15px rgba(100, 255, 100, 0.05);
}

.track-info {
    display: flex;
    align-items: center;
    width: 30%;
}

.album-art {
    width: 65px;
    height: 65px;
    border-radius: 8px; /* Slightly more rounded */
    margin-right: 18px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}

.track-text h4 {
    margin: 0;
    font-size: 1.1rem;
    /* Subtle neon green glow on text */
    text-shadow: 0 0 5px rgba(150, 255, 150, 0.5);
}

.track-text p {
    margin: 0;
    font-size: 0.85rem;
    color: #a3bca3; /* Desaturated, organic green-grey */
}

.player-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 40%;
}

.buttons {
    display: flex;
    align-items: center;
    gap: 25px;
    margin-bottom: 8px;
}

.control-btn {
    cursor: pointer;
    font-size: 1.3rem;
    opacity: 0.75;
    color: #e0eee0; /* Off-white, soft nature feel */
    transition: 0.2s;
}

.control-btn:hover {
    opacity: 1;
    color: #aaffaa; /* Bright pale green on hover */
    transform: scale(1.08);
}

.progress-container {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
}

.progress-bar {
    flex-grow: 1;
    height: 5px; /* Slightly thicker for better visibility */
    background: rgba(100, 120, 100, 0.4); /* Muted green track */
    border-radius: 3px;
    position: relative;
    cursor: pointer;
}

#progress {
    width: 0%;
    height: 100%;
    background: #ccffcc; /* Pale, soft green progress */
    border-radius: 3px;
    /* Glow for progress bar */
    box-shadow: 0 0 10px rgba(150, 255, 150, 0.6);
}

.time {
    font-size: 0.75rem;
    color: #a3bca3;
    min-width: 35px;
}

/* --- Clean Volume Slider --- */
.volume-section {
    width: 30%;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
}

#volume-slider {
    -webkit-appearance: none; /* Remove default styling */
    appearance: none;
    width: 100px;
    height: 4px;
    background: rgba(100, 120, 100, 0.4);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
}

/* Slider handle (thumb) styling */
#volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #ccffcc;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(150, 255, 150, 0.8);
    transition: 0.2s;
}

#volume-slider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    background: #ffffff;
}

/* For Firefox */
#volume-slider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #ccffcc;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(150, 255, 150, 0.8);
}

#mute-icon {
    font-size: 1.1rem;
    color: #a3bca3;
    cursor: pointer;
}

</style>
</head>

<body>

<div id="enter">click to enter</div>

<video autoplay muted loop>
    <source src="ssstik.io_@bob305890_1773894028146.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="wrapper">
    <div class="container" id="main">
        <img src="jeroldtwitchpfp.jpg" class="pfp">
        <h1 id="name"></h1>
        <p>📍 killwaukee</p>

        <div class="links">
            <a href="https://www.instagram.com/oliiverrg" target="_blank">instagram</a>
            <a href="https://www.tiktok.com/@oliver.org" target="_blank">tiktok</a>
            <a href="https://discord.com/users/675104449160806400">discord</a>
            <a href="https://www.twitch.tv/jeroldy">twitch</a>
            <a href="https://www.youtube.com/@jeroldyt">youtube</a>
        </div>
    </div>
</div>

<div id="player-bar">
    <div class="track-info">
        <img src="myshitaboogie.png" alt="TBA Album Cover" class="album-art">
        <div class="track-text">
            <h4>My Shit</h4>
            <p>A Boogie Wit Da Hoodie</p>
        </div>
    </div>

    <div class="player-controls">
        <div class="buttons">
            <div class="control-btn">⏮</div>
            <div id="playPause" class="control-btn">⏸</div>
            <div class="control-btn">⏭</div>
        </div>
        <div class="progress-container">
            <span class="time" id="current-time">0:00</span>
            <div class="progress-bar"><div id="progress"></div></div>
            <span class="time" id="duration">0:00</span>
        </div>
    </div>

    <div class="volume-section">
        <span id="mute-icon">🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3">
    </div>
</div>

<audio id="music" loop>
    <source src="242326090.mp3" type="audio/mpeg">
</audio>

<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const playPause = document.getElementById("playPause");
const container = document.getElementById("main");
const progressBar = document.getElementById("progress");
const currTimeTxt = document.getElementById("current-time");
const durationTxt = document.getElementById("duration");
const volumeSlider = document.getElementById("volume-slider");
const muteIcon = document.getElementById("mute-icon");

let fadeInterval;
let isPaused = false;
let previousVolume = 0.3; // Default volume for unmute

/* --- AUDIO FADE LOGIC --- */
function fadeAudio(targetVolume) {
    clearInterval(fadeInterval);
    const step = 0.05;
    const speed = 50;

    fadeInterval = setInterval(() => {
        if (music.volume < targetVolume) {
            music.volume = Math.min(music.volume + step, targetVolume);
        } else if (music.volume > targetVolume) {
            music.volume = Math.max(music.volume - step, targetVolume);
        }
        // Update slider position with the fade
        volumeSlider.value = music.volume;
        updateMuteIcon(music.volume);

        if (music.volume === targetVolume) clearInterval(fadeInterval);
    }, speed);
}

/* --- TAB VISIBILITY --- */
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        // Just pause for tab switch, it's less jarring than a fade
        music.pause();
    } else {
        if (enter.style.display === "none" && !isPaused) {
            // User returned, resume if it was playing
            music.play();
            // Ensure volume is correct on return
            music.volume = volumeSlider.value;
        }
    }
});

/* --- ENTER SCREEN --- */
enter.addEventListener("click", () => {
    enter.style.opacity = "0";
    enter.style.backdropFilter = "blur(0px)";
    setTimeout(() => { enter.style.display = "none"; }, 800);
    // Set initial volume from the slider
    music.volume = volumeSlider.value;
    music.play();
    // No fade here, user is expecting music after the 'click'
});

/* --- PLAY/PAUSE TOGGLE --- */
playPause.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        playPause.innerText = "⏸";
        isPaused = false;
    } else {
        music.pause();
        playPause.innerText = "▶";
        isPaused = true;
    }
});

/* --- VOLUME SLIDER & MUTE LOGIC --- */
volumeSlider.addEventListener("input", (e) => {
    const volume = e.target.value;
    music.volume = volume;
    updateMuteIcon(volume);
    // If user interacts with volume, cancel any ongoing fade
    clearInterval(fadeInterval); 
});

muteIcon.addEventListener("click", () => {
    if (music.volume > 0) {
        previousVolume = music.volume;
        fadeAudio(0);
    } else {
        fadeAudio(previousVolume);
    }
});

function updateMuteIcon(volume) {
    if (volume == 0) {
        muteIcon.innerText = "🔇";
    } else if (volume < 0.5) {
        muteIcon.innerText = "🔉";
    } else {
        muteIcon.innerText = "🔊";
    }
}

/* --- PROGRESS BAR LOGIC --- */
music.addEventListener("timeupdate", () => {
    const curr = music.currentTime;
    const dur = music.duration;
    if (dur) {
        progressBar.style.width = (curr / dur) * 100 + "%";
        currTimeTxt.innerText = formatTime(curr);
        durationTxt.innerText = formatTime(dur);
    }
});

function formatTime(secs) {
    const mins = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${mins}:${s < 10 ? '0' : ''}${s}`;
}

/* --- TYPING EFFECT --- */
const text = "jeroldy";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}
type();

/* --- SMOOTH PARALLAX --- */
let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
const friction = 0.08; 

document.addEventListener("mousemove", (e) => {
    targetX = (window.innerWidth / 2 - e.clientX) / 20;
    targetY = (window.innerHeight / 2 - e.clientY) / 20;
});

function animateParallax() {
    currentX += (targetX - currentX) * friction;
    currentY += (targetY - currentY) * friction;
    container.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
    requestAnimationFrame(animateParallax);
}
animateParallax();
</script>

</body>
</html>
