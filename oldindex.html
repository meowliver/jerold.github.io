<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jeroldy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Background video */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* Overlay blur/dark */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* Enter screen */
#enter {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    cursor: pointer;
    background: black;
    z-index: 10;
}

/* Main content */
.container {
    position: relative;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
    display: none;
}

/* Animated name */
h1 {
    font-size: 3rem;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 20px white, 0 0 40px white; }
}

/* Profile pic */
img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* Links */
.links a {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

/* Mute button */
#muteBtn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    cursor: pointer;
    z-index: 5;
}
</style>
</head>

<body>

<div id="enter">click to enter</div>

<video autoplay muted loop>
    <source src="ssstik.io_@bob305890_1773894028146.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div id="muteBtn">🔇</div>

<div class="container" id="main">
    <img src="jeroldtwitchpfp.jpg">
    <h1 id="jerold"></h1>
    <p>📍 killwaukee</p>

    <div class="links">
        <a href="https://instagram.com/oliiverrg" target="_blank">instagram</a>
        <a href="https://tiktok.com/@oliver.org" target="_blank">tiktok</a>
        <a href="https://discord.com/users/675104449160806400">discord</a>
    </div>
</div>

<audio id="music" loop>
    <source src="242326090.mp3" type="audio/mpeg">
</audio>

<script>
const enter = document.getElementById("enter");
const main = document.getElementById("main");
const music = document.getElementById("music");
const muteBtn = document.getElementById("muteBtn");

/* click to enter */
enter.addEventListener("click", () => {
    enter.style.display = "none";
    main.style.display = "block";
    music.play();
});

/* mute toggle */
let muted = false;
muteBtn.addEventListener("click", () => {
    muted = !muted;
    music.muted = muted;
    muteBtn.innerText = muted ? "🔇" : "🔊";
});

/* typing animation */
const text = "jeroldy";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}

type();
</script>

</body>
</html>
